<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Manager Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="dashboard">
        <header>
            <h1>Lead Manager</h1>
            <p class="subtitle">Gestión de prospectos en tiempo real</p>
        </header>

        <section class="form-section">
            <form id="lead-form" aria-label="Agregar nuevo prospecto">
                <div class="input-group">
                    <label for="name">Nombre Completo</label>
                    <input type="text" id="name" required minlength="3" placeholder="Ej: Jorge Paz">
                </div>
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="jorge@ejemplo.com">
                </div>
                <div class="input-group">
                    <label for="phone">Teléfono</label>
                    <input type="tel" id="phone" required pattern="[0-9+ \-]{7,15}" title="Ingresá un número de teléfono válido" placeholder="+54 11 1234-5678">
                </div>
                <button type="submit" id="submit-btn" class="btn-primary">
                    <span class="btn-text">Agregar Lead</span>
                </button>
            </form>
        </section>

        <section class="table-section">
            <div class="table-container">
                <table id="leads-table">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Teléfono</th>
                            <th>Estado</th>
                            <th>Acciones</th> </tr>
                    </thead>
                    <tbody id="leads-body">
                        </tbody>
                </table>
            </div>
            <p id="error-message" class="error hidden" role="alert"></p>
        </section>
    </main>
    <script type="module" src="app.js"></script>
</body>
</html>
